<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>聊天 App</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:#000; color:#fff; height:100vh; overflow:hidden;
    display:flex; justify-content:center; align-items:center;
  }
  /* 手机壳 */
  .phone {
    width:100%; max-width:430px; height:100vh; max-height:932px;
    background:#111; display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  @media (min-width: 431px) {
    .phone { border-radius:40px; height:92vh; box-shadow:0 0 60px rgba(0,0,0,0.5); }
  }
  /* 状态栏 */
  .status-bar { padding:12px 24px 6px; font-size:12px; color:#888; text-align:center; }
  /* 页面容器 */
  .screen { display:none; flex-direction:column; flex:1; overflow:hidden; }
  .screen.active { display:flex; }
  /* 导航栏 */
  .navbar { padding:12px 16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid #222; }
  .navbar .title { flex:1; font-size:18px; font-weight:600; text-align:center; }
  .navbar .btn { color:#0af; font-size:15px; cursor:pointer; background:none; border:none; padding:4px 8px; }
  /* ---- 登录/注册页 ---- */
  .auth-container { flex:1; display:flex; flex-direction:column; padding:40px 24px; gap:20px; justify-content:center; }
  .auth-container h1 { font-size:32px; text-align:center; margin-bottom:20px; }
  .tabs { display:flex; gap:0; margin-bottom:8px; }
  .tabs button { flex:1; padding:12px; border:none; background:transparent; color:#666; font-size:16px;
    cursor:pointer; border-bottom:2px solid transparent; transition:.2s; }
  .tabs button.on { color:#0af; border-bottom-color:#0af; }
  .input-group { display:flex; flex-direction:column; gap:4px; }
  .input-group label { font-size:13px; color:#888; }
  .input-group input { padding:14px; background:#1c1c1e; border:1px solid #333; border-radius:10px;
    color:#fff; font-size:16px; outline:none; transition:.2s; }
  .input-group input:focus { border-color:#0af; }
  .btn-primary { padding:14px; background:#0af; color:#fff; border:none; border-radius:10px;
    font-size:17px; font-weight:600; cursor:pointer; margin-top:8px; }
  .btn-primary:active { opacity:.7; }
  .error-msg { color:#ff4d4d; font-size:14px; text-align:center; min-height:20px; }
  /* ---- 联系人列表 ---- */
  .contact-list { flex:1; overflow-y:auto; }
  .contact-item { display:flex; align-items:center; padding:14px 16px; border-bottom:1px solid #1a1a1a; cursor:pointer; gap:12px; }
  .contact-item:active { background:#1a1a1a; }
  .contact-avatar { width:48px; height:48px; border-radius:50%; background:#0af;
    display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; flex-shrink:0; }
  .contact-info { flex:1; }
  .contact-name { font-size:16px; }
  /* ---- 聊天页 ---- */
  .chat-messages { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:8px; }
  .msg-row { display:flex; flex-direction:column; max-width:80%; }
  .msg-row.me { align-self:flex-end; }
  .msg-row.other { align-self:flex-start; }
  .msg-bubble { padding:10px 14px; border-radius:18px; font-size:15px; line-height:1.4; word-break:break-word; }
  .msg-row.me .msg-bubble { background:#0a84ff; color:#fff; border-bottom-right-radius:4px; }
  .msg-row.other .msg-bubble { background:#2c2c2e; color:#fff; border-bottom-left-radius:4px; }
  .msg-time { font-size:11px; color:#666; margin-top:2px; }
  .msg-row.me .msg-time { text-align:right; }
  .chat-input-area { display:flex; padding:10px 12px; gap:8px; border-top:1px solid #222; background:#111; align-items:flex-end; }
  .chat-input-area input { flex:1; padding:12px 16px; background:#1c1c1e; border:1px solid #333; border-radius:22px;
    color:#fff; font-size:15px; outline:none; }
  .chat-input-area input:focus { border-color:#0af; }
  .chat-input-area button { width:44px; height:44px; border-radius:50%; border:none; background:#0af; color:#fff;
    font-size:20px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .chat-input-area button:active { opacity:.7; }
  .empty-chat { flex:1; display:flex; align-items:center; justify-content:center; color:#555; font-size:15px; }
  .loading { text-align:center; color:#666; padding:40px; }
  /* 滚动条隐藏 */
  ::-webkit-scrollbar { width:0; }
</style>
</head>
<body>

<div class="phone">

  <!-- ============================================ -->
  <!-- 页面1：登录 / 注册                           -->
  <!-- ============================================ -->
  <div class="screen active" id="authScreen">
    <div class="auth-container">
      <h1>💬 聊天 App</h1>
      <div class="tabs">
        <button id="tabLogin" class="on" onclick="switchTab('login')">登录</button>
        <button id="tabRegister" onclick="switchTab('register')">注册</button>
      </div>
      <div class="input-group">
        <label>用户名</label>
        <input id="authUsername" placeholder="输入用户名" />
      </div>
      <div class="input-group">
        <label>密码</label>
        <input id="authPassword" type="password" placeholder="输入密码" />
      </div>
      <div class="error-msg" id="authError"></div>
      <button class="btn-primary" id="authBtn" onclick="doAuth()">登录</button>
    </div>
  </div>

  <!-- ============================================ -->
  <!-- 页面2：联系人列表                            -->
  <!-- ============================================ -->
  <div class="screen" id="contactsScreen">
    <div class="navbar">
      <div style="width:50px;"></div>
      <div class="title">联系人</div>
      <button class="btn" onclick="logout()">退出</button>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- ============================================ -->
  <!-- 页面3：聊天窗口                              -->
  <!-- ============================================ -->
  <div class="screen" id="chatScreen">
    <div class="navbar">
      <button class="btn" onclick="goBack()">← 返回</button>
      <div class="title" id="chatTitle">聊天</div>
      <div style="width:50px;"></div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
      <input id="chatInput" placeholder="输入消息..." />
      <button onclick="sendMessage()">↑</button>
    </div>
  </div>

</div>

<script>
// ============================================
// 全局状态
// ============================================
let token = null;
let currentUser = null;
let currentPeer = null;       // {id, username}
let currentMode = 'login';    // 'login' | 'register'
let ws = null;

// API 基础地址（自动检测）
const API = '';

// ============================================
// API 函数
// ============================================
async function api(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + url, { ...options, headers });
  return res.json();
}

// ============================================
// 页面切换
// ============================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================
// 登录 / 注册 切换
// ============================================
function switchTab(mode) {
  currentMode = mode;
  document.getElementById('tabLogin').className = mode === 'login' ? 'on' : '';
  document.getElementById('tabRegister').className = mode === 'register' ? 'on' : '';
  document.getElementById('authBtn').textContent = mode === 'login' ? '登录' : '注册';
  document.getElementById('authError').textContent = '';
}

async function doAuth() {
  const username = document.getElementById('authUsername').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  const errorEl = document.getElementById('authError');

  if (!username || !password) {
    errorEl.textContent = '请填写用户名和密码';
    return;
  }

  const url = currentMode === 'login' ? '/api/login' : '/api/register';
  const result = await api(url, { method: 'POST', body: JSON.stringify({ username, password }) });

  if (result.error) {
    errorEl.textContent = result.error;
    return;
  }

  // 登录/注册成功
  token = result.token;
  currentUser = result.user;
  localStorage.setItem('token', token);
  localStorage.setItem('user', JSON.stringify(currentUser));

  errorEl.textContent = '';
  document.getElementById('authUsername').value = '';
  document.getElementById('authPassword').value = '';

  connectWebSocket();
  showScreen('contactsScreen');
  loadContacts();
}

// ============================================
// 退出登录
// ============================================
function logout() {
  token = null;
  currentUser = null;
  currentPeer = null;
  localStorage.clear();
  if (ws) ws.close();
  showScreen('authScreen');
}

// ============================================
// 加载联系人列表
// ============================================
async function loadContacts() {
  const list = document.getElementById('contactList');
  list.innerHTML = '<div class="loading">加载联系人...</div>';

  const result = await api('/api/contacts');
  if (result.error) { list.innerHTML = `<div class="loading">${result.error}</div>`; return; }

  if (result.contacts.length === 0) {
    list.innerHTML = '<div class="loading">还没有其他用户<br>让朋友也注册一个账号吧！</div>';
    return;
  }

  list.innerHTML = result.contacts.map(c => `
    <div class="contact-item" onclick="openChat(${c.id}, '${c.username}')">
      <div class="contact-avatar">${c.username[0].toUpperCase()}</div>
      <div class="contact-info"><div class="contact-name">${c.username}</div></div>
    </div>
  `).join('');
}

// ============================================
// 打开聊天
// ============================================
async function openChat(peerId, peerName) {
  currentPeer = { id: peerId, username: peerName };
  document.getElementById('chatTitle').textContent = peerName;
  showScreen('chatScreen');

  const container = document.getElementById('chatMessages');
  container.innerHTML = '<div class="loading">加载消息中...</div>';

  // 加载历史消息
  const result = await api(`/api/messages/${peerId}`);
  if (result.error) { container.innerHTML = `<div class="loading">${result.error}</div>`; return; }

  if (result.messages.length === 0) {
    container.innerHTML = `<div class="empty-chat">和 ${peerName} 的聊天是空的<br>发条消息打个招呼吧 👋</div>`;
  } else {
    container.innerHTML = result.messages.map(m => renderMessage(m)).join('');
    container.scrollTop = container.scrollHeight;
  }

  // 聚焦输入框
  setTimeout(() => document.getElementById('chatInput').focus(), 100);
}

function goBack() {
  currentPeer = null;
  showScreen('contactsScreen');
  loadContacts(); // 刷新联系人列表
}

// ============================================
// 渲染一条消息
// ============================================
function renderMessage(m) {
  const isMe = m.from_user === currentUser.id || m.from === currentUser.id;
  const cls = isMe ? 'me' : 'other';
  const time = m.time || new Date(m.created_at).toLocaleTimeString('zh-CN', { hour12: false });
  return `
    <div class="msg-row ${cls}" data-id="${m.id}">
      <div class="msg-bubble">${escapeHtml(m.content)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================
// 发送消息
// ============================================
function sendMessage() {
  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  if (!content || !currentPeer) return;

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({
      type: 'private_message',
      to: currentPeer.id,
      content: content
    }));
    input.value = '';
    input.focus();
  }
}

// ============================================
// WebSocket 连接
// ============================================
function connectWebSocket() {
  if (ws) ws.close();

  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.host}`;

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    // 发送认证信息
    ws.send(JSON.stringify({ type: 'auth', token: token }));
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);

    if (msg.type === 'auth_ok') {
      console.log('✅ WebSocket 认证成功');
      return;
    }

    if (msg.type === 'new_message') {
      // 收到新消息
      const peerId = msg.from === currentUser.id ? msg.to : msg.from;

      // 如果正在和这个人聊天，显示消息
      if (currentPeer && currentPeer.id === peerId) {
        const container = document.getElementById('chatMessages');
        // 移除空状态提示
        const empty = container.querySelector('.empty-chat');
        if (empty) container.innerHTML = '';
        container.insertAdjacentHTML('beforeend', renderMessage(msg));
        container.scrollTop = container.scrollHeight;
      }

      // 刷新联系人列表（更新排序等）
      if (!currentPeer) loadContacts();
    }

    if (msg.type === 'error') {
      console.error('WS Error:', msg.message);
    }
  };

  ws.onclose = () => {
    console.log('⚠️ WebSocket 断开，3秒后重连...');
    if (token) setTimeout(connectWebSocket, 3000);
  };
}

// ============================================
// 键盘发送
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  document.getElementById('authPassword').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doAuth();
  });
});

// ============================================
// 自动登录（如果之前登录过）
// ============================================
(function autoLogin() {
  const savedToken = localStorage.getItem('token');
  const savedUser = localStorage.getItem('user');
  if (savedToken && savedUser) {
    token = savedToken;
    currentUser = JSON.parse(savedUser);
    connectWebSocket();
    showScreen('contactsScreen');
    loadContacts();
  }
})();
</script>
</body>
</html>
